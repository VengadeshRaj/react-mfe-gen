name: Node.js Package

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm ci

      # Get published version from npm registry
      - name: Get published version from npm
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PREV_VERSION=$(npm view $PACKAGE_NAME version 2>/dev/null || echo "0.0.0")
          echo "PREV_VERSION=$PREV_VERSION" >> $GITHUB_ENV

      # Get current version from package.json
      - name: Get current version
        run: |
          CURR_VERSION=$(node -p "require('./package.json').version")
          echo "CURR_VERSION=$CURR_VERSION" >> $GITHUB_ENV

      # Compare versions
      - name: Check version change
        id: version_check
        run: |
          echo "Published version: $PREV_VERSION"
          echo "Current version: $CURR_VERSION"
          if [ "$PREV_VERSION" = "$CURR_VERSION" ]; then
            echo "Version not changed. Skipping publish."
            echo "publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version changed. Ready to publish."
            echo "publish=true" >> $GITHUB_OUTPUT
          fi

      # Publish only if version changed
      - name: Publish to npm
        if: steps.version_check.outputs.publish == 'true'
        run: npm publish --access public